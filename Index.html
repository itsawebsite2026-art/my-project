                { id: 'คำนวณราคา', label: 'งานพิมพ์ (อิงค์เจ็ท/UV/HP)' } // Mapping old sheet to new label concept
            ]);
            const [activeForm, setActiveForm] = React.useState(''); // Start empty to show "Select Category" state
            const [sheetData, setSheetData] = React.useState(null);
            const [formulas, setFormulas] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [calculating, setCalculating] = React.useState(false);
            const [displayRange, setDisplayRange] = React.useState({ startRow: 0, endRow: 0, startCol: 0, endCol: 0 });

            // Effect: Fetch data when activeForm changes
            React.useEffect(() => {
                if (activeForm) {
                    fetchData(activeForm);
                } else {
                    setSheetData(null);
                }
            }, [activeForm]);

            const findContentBounds = (data) => {
                let startRow = 0, endRow = data.length - 1;
                let startCol = 0, endCol = data[0].length - 1;

                // Trim empty rows from start
                while (startRow <= endRow && data[startRow].every(cell => !cell)) startRow++;
                // Trim empty rows from end
                while (endRow >= startRow && data[endRow].every(cell => !cell)) endRow--;

                if (startRow > endRow) return { startRow: 0, endRow: 0, startCol: 0, endCol: 0 }; // Empty sheet

                // Trim empty cols from start
                while (startCol <= endCol) {
                    let isEmpty = true;
                    for (let r = startRow; r <= endRow; r++) if (data[r][startCol]) { isEmpty = false; break; }
                    if (!isEmpty) break;
                    startCol++;
                }
                // Trim empty cols from end
                while (endCol >= startCol) {
                    let isEmpty = true;
                    for (let r = startRow; r <= endRow; r++) if (data[r][endCol]) { isEmpty = false; break; }
                    if (!isEmpty) break;
                    endCol--;
                }

                return { startRow, endRow, startCol, endCol };
            };

            const fetchData = (sheetName) => {
                setLoading(true);
                setSheetData(null);
                // Simulate network delay for better UX feel
                google.script.run
                    .withSuccessHandler((response) => {
                        if (response.success) {
                            const bounds = findContentBounds(response.displayValues);
                            setDisplayRange(bounds);
                            setSheetData(response.displayValues);
                            setFormulas(response.formulas);
                        } else {
                            notify('Error: ' + response.error, 'error');
                        }
                        setLoading(false);
                    })
                    .withFailureHandler((err) => {
                        notify('Error: ' + err.message, 'error');
                        setLoading(false);
                    })
                    .getSheetForCalculation(sheetName);
            };

            const handleCellUpdate = (rIdx, cIdx, newValue, oldValue) => {
                if (newValue === oldValue) return;

                // Optimistic Update
                const newData = [...sheetData];
                newData[rIdx] = [...newData[rIdx]];
                newData[rIdx][cIdx] = newValue;
                setSheetData(newData);
                setCalculating(true);

                google.script.run
                    .withSuccessHandler((response) => {
                        if (response.success) {
                            const bounds = findContentBounds(response.displayValues);
                            setDisplayRange(bounds);
                            setSheetData(response.displayValues);
                        } else {
                            notify('Error updating: ' + response.error, 'error');
                            // Revert on error
                            setSheetData(sheetData);
                        }
                        setCalculating(false);
                    })
                    .withFailureHandler((err) => {
                        notify('Error: ' + err.message, 'error');
                        setCalculating(false);
                    })
                    .updateCellAndRecalculate(activeForm, rIdx, cIdx, newValue);
            };

            // Render Logic (Keeping the complex invoice logic for Slim Lightbox)
            const renderSlimLightboxTable = () => {
                // ... (Keep existing implementation but styled smoothly) ...
                if (!sheetData || sheetData.length === 0) return (
                    <div className="flex flex-col items-center justify-center p-12 text-slate-400">
                        <div className="animate-spin mb-4 text-[#4A90E2]"><Icon name="Loader2" size={32} /></div>
                        Loading Data...
                    </div>
                );

                // Configuration matches exactly what we verified
                const columns = [
                    { id: 'width', label: 'Width (cm)', colIdx: 2, type: 'number', width: 'flex-1', required: true },
                    { id: 'length', label: 'Length (cm)', colIdx: 3, type: 'number', width: 'flex-1', required: true },
                    { id: 'qty', label: 'Qty', colIdx: 8, type: 'number', width: 'w-24', required: true },
                    // Hidden/Implicit fields logic: Paint, Print, Transformer are REQUIRED by formula but user wanted a simplified view?
                    // NO, we MUST show them or the formula fails. We will style them nicely.
                    { id: 'paint', label: 'Paint Frame', colIdx: 4, type: 'select', options: ['Yes', 'No'], width: 'flex-1', required: true },
                    { id: 'print', label: 'Print Work', colIdx: 5, type: 'select', options: ['Yes', 'No'], width: 'flex-1', required: true },
                    { id: 'transformer', label: 'Transformer', colIdx: 7, type: 'select', options: ['Yes', 'No'], width: 'flex-1', required: true },
                    // Price (Readonly)
                    { id: 'price', label: 'Est. Price', colIdx: 9, type: 'readonly', align: 'right' }
                ];

                const startRowIdx = 4;
                const endRowIdx = 11;
                // Summary Rows
                const totalRowIdx = 12; // J13
                const vatRowIdx = 13;   // J14
                const grandTotalRowIdx = 14; // J15
                const summaryColIdx = 9; // Column J

                return (
                    <div className="animate-fade-in">
                        {/* Rows */}
                        <div className="space-y-4">
                            {Array.from({ length: endRowIdx - startRowIdx + 1 }, (_, i) => startRowIdx + i).map((rowIndex, idx) => {
                                // Only show first 1-2 rows for cleanliness or all?
                                // User asked for "Row fields" style.
                                // Let's render as a grid of inputs for each "Item" (Row)

                                // Check if row has data or is the first one
                                const hasData = sheetData[rowIndex] && sheetData[rowIndex].some((cell, cIdx) => cIdx >= 2 && cIdx <= 8 && cell !== "");
                                if (idx > 0 && !hasData) return null; // Hide empty rows for cleaner "Form" look

                                return (
                                    <div key={rowIndex} className="p-4 bg-slate-50 rounded-lg border border-slate-200 mb-4">
                                        <div className="text-xs font-bold text-slate-400 uppercase mb-3">Item #{idx + 1}</div>

                                        {/* Flex Row 1: Dimensions & Qty */}
                                        <div className="flex flex-wrap gap-4 mb-4">
                                            {columns.filter(c => ['width', 'length', 'qty'].includes(c.id)).map(col => {
                                                const rawValue = sheetData[rowIndex][col.colIdx];
                                                return (
                                                    <div key={col.id} className="flex-1 min-w-[100px]">
                                                        <label className="block text-sm font-semibold text-slate-600 mb-1">{col.label}</label>
                                                        <input
                                                            type="text"
                                                            defaultValue={rawValue}
                                                            className={`w-full p-3 border rounded-lg outline-none focus:border-[#4A90E2] transition-colors ${col.required && !rawValue ? 'border-red-300 bg-red-50' : 'border-slate-300 bg-white'
                                                                }`}
                                                            onBlur={(e) => handleCellUpdate(rowIndex, col.colIdx, e.target.value, rawValue)}
                                                        />
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {/* Flex Row 2: Options */}
                                        <div className="flex flex-wrap gap-4">
                                            {columns.filter(c => ['paint', 'print', 'transformer'].includes(c.id)).map(col => {
                                                const rawValue = sheetData[rowIndex][col.colIdx];
                                                return (
                                                    <div key={col.id} className="flex-1 min-w-[120px]">
                                                        <label className="block text-sm font-semibold text-slate-600 mb-1">{col.label}</label>
                                                        <select
                                                            value={rawValue}
                                                            onChange={(e) => handleCellUpdate(rowIndex, col.colIdx, e.target.value, rawValue)}
                                                            className={`w-full p-3 border rounded-lg outline-none focus:border-[#4A90E2] bg-white cursor-pointer ${col.required && !rawValue ? 'border-red-300 bg-red-50' : 'border-slate-300'
                                                                }`}
                                                        >
                                                            <option value="">- Select -</option>
                                                            {col.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {/* Row Price Display if available */}
                                        {sheetData[rowIndex][9] && (
                                            <div className="mt-4 pt-3 border-t border-slate-200 text-right">
                                                <span className="text-sm text-slate-500 mr-2">Unit Price:</span>
                                                <span className="font-bold text-slate-700">{sheetData[rowIndex][9]}</span>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}

                            {/* Button to add more items? For now just showing the rows that exist in sheet (5-11) */}
                        </div>

                        {/* Result Box */}
                        {sheetData[totalRowIdx] && (
                            <div className="mt-8 bg-[#f8fcfb] border border-[#cce5df] rounded-lg p-6 text-center">
                                <h3 className="text-lg font-bold text-[#2c3e50] mb-2">ราคาประเมินเบื้องต้น</h3>
                                <div className="text-4xl font-bold text-[#2c3e50] my-2">
                                    {sheetData[grandTotalRowIdx][summaryColIdx]} <span className="text-sm text-slate-500 font-normal">THB</span>
                                </div>
                                <p className="text-sm text-[#e74c3c]">* ราคานี้ยังไม่รวม VAT 7% ({sheetData[vatRowIdx][summaryColIdx]})</p>
                            </div>
                        )}
                    </div>
                );
            };

            const renderGenericTable = () => (
                <div className="p-8 text-center text-slate-400">
                    <Icon name="Tool" size={48} className="mx-auto mb-4 opacity-50" />
                    <p>Calculators for this category are coming soon...</p>
                </div>
            );

            return (
                <div className="flex justify-center p-4 md:p-10 font-[Segoe UI,Tahoma,Geneva,Verdana,sans-serif]">
                    {/* Main Card Container */}
                    <div className="bg-white w-full max-w-lg rounded-lg shadow-2xl overflow-hidden">
                        {/* Header */}
                        <div className="p-6 border-b border-[#e0e0e0] text-center bg-slate-50/50">
                            <h2 className="text-2xl font-bold text-[#333333] m-0 mb-1">Calculate Material</h2>
                            <p className="text-[#888888] text-sm m-0">ระบบประเมินราคาวัสดุและงานผลิต</p>
                        </div>

                        {/* Form Body */}
                        <div className="p-6 md:p-8">
                            {/* Category Select */}
                            <div className="mb-6">
                                <label className="block text-sm font-bold text-[#333333] mb-2">ประเภทงาน (Category)</label>
                                <div className="relative">
                                    <select
                                        className="w-full p-3 pr-10 border border-[#e0e0e0] rounded-lg text-base outline-none focus:border-[#4A90E2] bg-white appearance-none cursor-pointer transition-colors"
                                        value={activeForm}
                                        onChange={(e) => setActiveForm(e.target.value)}
                                    >
                                        <option value="" disabled>-- เลือกหมวดหมู่งาน --</option>
                                        {forms.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
                                        <option value="metalLetter">งานอักษรโลหะ</option>
                                        <option value="neonFlex">ไฟนีออนเฟล็ก</option>
                                    </select>
                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                        <Icon name="ChevronDown" size={18} />
                                    </div>
                                </div>
                            </div>

                            {/* Dynamic Content */}
                            <div className="dynamic-fields-container min-h-[200px]">
                                {loading ? (
                                    <div className="flex justify-center items-center h-40 text-[#4A90E2]">
                                        <Icon name="Loader2" size={32} className="animate-spin" />
                                    </div>
                                ) : !activeForm ? (
                                    <div className="text-center py-10 text-slate-300">
                                        <p>กรุณาเลือกประเภทงานเพื่อเริ่มคำนวณ</p>
                                    </div>
                                ) : activeForm === 'คำนวณราคา Slim light box' ? (
                                    renderSlimLightboxTable()
                                ) : (
                                    renderGenericTable()
                                )}
                            </div>

                            {/* Calculate Button (Visual only, as real-time is active) */}
                            {/* We can hide it or make it trigger a refresh */}
                            {/* <button className="w-full bg-[#4A90E2] text-white font-bold py-3.5 px-4 rounded-lg mt-6 hover:bg-[#357ABD] transition-colors shadow-md active:transform active:scale-[0.98]">
                                คำนวณราคา
                             </button> */}
                        </div>
                    </div>

                    {/* Inline Styles for User Request */}
                    <style dangerouslySetInnerHTML={{
                        __html: `
                        :root {
                            --primary-color: #4A90E2;
                            --primary-hover: #357ABD;
                        }
                    `}} />
                </div>
            );
        };

        const ToastNotification = ({ notifications, removeNotification }) => {
            if (notifications.length === 0) return null;
            return (
                <div className="fixed top-6 right-6 z-[300] flex flex-col gap-3">
                    {notifications.map(n => (
                        <div key={n.id} className={`p-4 rounded-xl shadow-2xl flex items-center gap-3 animate-fade-in-right min-w-[320px] border-l-4 ${n.type === 'success' ? 'bg-emerald-50 border-emerald-500 text-emerald-800' :
                            n.type === 'error' ? 'bg-red-50 border-red-500 text-red-800' :
                                'bg-blue-50 border-blue-500 text-blue-800'
                            }`}>
                            <div className="shrink-0">
                                {n.type === 'success' && <Icon name="CheckCircle" size={20} className="text-emerald-500" />}
                                {n.type === 'error' && <Icon name="AlertCircle" size={20} className="text-red-500" />}
                                {n.type === 'info' && <Icon name="Info" size={20} className="text-blue-500" />}
                            </div>
                            <div className="flex-1 text-sm font-bold">{n.message}</div>
                            <button onClick={() => removeNotification(n.id)} className="text-slate-400 hover:text-slate-600 transition-colors shrink-0">
                                <Icon name="X" size={16} />
                            </button>
                        </div>
                    ))}
                </div>
            );
        };

        function App() {

            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [currentUser, setCurrentUser] = React.useState(null);
            const [salesUsers, setSalesUsers] = React.useState([]);
            const [isLoadingSales, setIsLoadingSales] = React.useState(false);
            const [designerUsers, setDesignerUsers] = React.useState([]);
            const [isLoadingDesigners, setIsLoadingDesigners] = React.useState(false);
            const [customerOptions, setCustomerOptions] = React.useState([]);
            const [isLoadingCustomers, setIsLoadingCustomers] = React.useState(false);

            // --- Notification State ---
            const [notifications, setNotifications] = React.useState([]);

            const notify = React.useCallback((message, type = 'success') => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setNotifications(prev => prev.filter(n => n.id !== id));
                }, 5000);
            }, []);

            const removeNotification = (id) => {
                setNotifications(prev => prev.filter(n => n.id !== id));
            };


            // Fetch Sales, Designer, and Customer Users
            React.useEffect(() => {
                if (window.google && window.google.script) {
                    setIsLoadingSales(true);
                    setIsLoadingDesigners(true);
                    setIsLoadingCustomers(true);

                    // Fetch Sales
                    window.google.script.run
                        .withSuccessHandler(users => {
                            setSalesUsers(users || []);
                            setIsLoadingSales(false);
                        })
                        .withFailureHandler(err => {
                            console.error("Error fetching sales:", err);
                            setIsLoadingSales(false);
                        })
                        .getSalesUserList();

                    // Fetch Designers
                    window.google.script.run
                        .withSuccessHandler(users => {
                            setDesignerUsers(users || []);
                            setIsLoadingDesigners(false);
                        })
                        .withFailureHandler(err => {
                            console.error("Error fetching designers:", err);
                            setIsLoadingDesigners(false);
                        })
                        .getDesignerUserList();

                    // Fetch Customers
                    window.google.script.run
                        .withSuccessHandler(customers => {
                            setCustomerOptions(customers || []);
                            setIsLoadingCustomers(false);
                        })
                        .withFailureHandler(err => {
                            console.error("Error fetching customers:", err);
                            setIsLoadingCustomers(false);
                        })
                        .getCustomerList();

                } else {
                    // Mock data
                    setSalesUsers(['Sales 1', 'Sales 2', 'Sales Manager']);
                    setDesignerUsers(['Graphic 1', 'Graphic 2']);
                    setCustomerOptions(['Customer A', 'Customer B']);
                }
            }, []);



            const [activeMenu, setActiveMenu] = React.useState('Dashboard');
            const [taskFilter, setTaskFilter] = React.useState(null); // Deep link filter

            const handleNavigate = (menu, filter = null) => {
                setTaskFilter(filter);
                setActiveMenu(menu);
            };

            const [tasks, setTasks] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(false);

            // --- Background Upload State ---
            const [activeUploads, setActiveUploads] = React.useState([]);

            const startBackgroundUpload = (uploadTask) => {
                // uploadTask = { orderNo, images, type: 'initial' | 'completion' }
                const newUpload = { ...uploadTask, status: 'uploading', error: null };
                const uploadIdx = activeUploads.length;
                setActiveUploads(prev => [...prev, newUpload]);

                if (window.google && window.google.script) {
                    const runFunc = uploadTask.type === 'initial' ? 'uploadTaskImages' : 'uploadCompletionImages';
                    window.google.script.run
                        .withSuccessHandler(res => {
                            if (res.success) {
                                updateUploadStatus(uploadIdx, 'completed');
                            } else {
                                updateUploadStatus(uploadIdx, 'error', res.error);
                            }
                        })
                        .withFailureHandler(err => {
                            updateUploadStatus(uploadIdx, 'error', err.message);
                        })[runFunc](uploadTask.images, uploadTask.orderNo);
                }
            };

            const updateUploadStatus = (idx, status, error = null) => {
                setActiveUploads(prev => prev.map((u, i) => i === idx ? { ...u, status, error } : u));
            };

            const retryUpload = (idx) => {
                const upload = activeUploads[idx];
                updateUploadStatus(idx, 'uploading');
                if (window.google && window.google.script) {
                    const runFunc = upload.type === 'initial' ? 'uploadTaskImages' : 'uploadCompletionImages';
                    window.google.script.run
                        .withSuccessHandler(res => {
                            if (res.success) updateUploadStatus(idx, 'completed');
                            else updateUploadStatus(idx, 'error', res.error);
                        })
                        .withFailureHandler(err => updateUploadStatus(idx, 'error', err.message))
                    [runFunc](upload.images, upload.orderNo);
                }
            };

            const removeUpload = (idx) => {
                setActiveUploads(prev => prev.filter((_, i) => i !== idx));
            };

            // --- Theme State ---
            const [theme, setTheme] = React.useState({ mode: 'light', color: '#F3F4F6' });
            const [showThemePicker, setShowThemePicker] = React.useState(false);

            // --- Notification State ---
            const [showNotifications, setShowNotifications] = React.useState(false);
            const [seenTaskNos, setSeenTaskNos] = React.useState([]); // Tracking tasks seen in the dropdown
            const [openedTaskNos, setOpenedTaskNos] = React.useState([]); // Tracking tasks actually clicked

            const unreadTasks = React.useMemo(() => {
                if (!currentUser || !tasks.length) return [];
                const roleLower = String(currentUser?.role || '').toLowerCase();
                const userName = String(currentUser?.name || '').trim();
                const isAdmin = roleLower.includes('admin') || roleLower.includes('ผู้ดูแลระบบ') || roleLower.includes('manager') || roleLower.includes('เจ้าของ');
                const isHeadGraphic = roleLower.includes('หัวหน้ากราฟิก') || roleLower.includes('graphics head');

                const today = new Date();
                const todayAD = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth() + 1).padStart(2, '0')}/${today.getFullYear()}`;

                return tasks.filter(t => {
                    const isNew = normalizeDate(t.date) === todayAD || t.status === 'Draft' || t.status === 'ฉบับร่าง';
                    if (!isNew) return false;

                    if (isHeadGraphic || isAdmin) return true;

                    const userNameLower = userName.toLowerCase();
                    const designerName = String(t.designer || '').trim().toLowerCase();
                    return designerName && (designerName.includes(userNameLower) || userNameLower.includes(designerName));
                });
            }, [tasks, currentUser]);

            // Apply Theme
            React.useEffect(() => {
                const root = document.getElementById('root');
                const body = document.body;

                if (theme.mode === 'dark') {
                    body.style.backgroundColor = '#0f172a';
                    if (root) {
                        root.style.backgroundColor = '#0f172a';
                        root.style.color = '#ffffff';
                    }
                } else if (theme.mode === 'custom') {
                    body.style.backgroundColor = theme.color;
                    if (root) {
                        root.style.backgroundColor = theme.color;
                        // Auto contrast
                        const hex = theme.color.replace('#', '');
                        const r = parseInt(hex.substring(0, 2), 16);
                        const g = parseInt(hex.substring(2, 4), 16);
                        const b = parseInt(hex.substring(4, 6), 16);
                        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
                        root.style.color = (yiq >= 128) ? '#1e293b' : '#ffffff';
                    }
                } else {
                    // Light (Default)
                    body.style.backgroundColor = '#E0E5EC';
                    if (root) {
                        root.style.backgroundColor = '#F3F4F6';
                        root.style.color = '#1e293b';
                    }
                }
            }, [theme]);

            // 2. ปรับให้ดึงข้อมูล Tasks ต่อเมื่อ "เข้าสู่ระบบแล้ว" เท่านั้น
            React.useEffect(() => {
                if (isLoggedIn) {
                    setIsLoading(true);
                    if (window.google && window.google.script) {
                        window.google.script.run
                            .withSuccessHandler(data => {
                                if (Array.isArray(data)) setTasks(data);
                                setIsLoading(false);
                            })
                            .withFailureHandler(err => {
                                console.error("Fetch failed:", err);
                                setIsLoading(false);
                            })
                            .getTasksData();
                    } else {
                        // Mock data for local testing
                        setTasks(MOCK_TASKS_DATA);
                        setIsLoading(false);
                    }
                }
            }, [isLoggedIn]);

            // 3. ฟังก์ชันเมื่อเข้าสู่ระบบสำเร็จ
            const handleLoginSuccess = (userData) => {
                setCurrentUser(userData);
                setIsLoggedIn(true);
            };

            // 4. ฟังก์ชันสำหรับปุ่มออกจากระบบ
            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUser(null);
                setTasks([]);
            };

            // ==========================================
            // หัวใจหลัก: ถ้ายังไม่ได้เข้าสู่ระบบ ให้ Return หน้า Login ทันที
            // ==========================================
            if (!isLoggedIn) {
                return (
                    <>
                        <LoginView onLoginSuccess={handleLoginSuccess} notify={notify} />
                        <ToastNotification notifications={notifications} removeNotification={removeNotification} />
                    </>
                );
            }

            // ถ้าเข้าสู่ระบบแล้ว ระบบจะแสดงโค้ดส่วนนี้ต่อไปตามปกติ
            const renderContent = () => {
                if (isLoading) {
                    return (
                        <div className="flex flex-col items-center justify-center h-full text-slate-400">
                            <div className="animate-spin mb-4"><Icon name="Loader2" size={40} /></div>
                            <p>กำลังเชื่อมต่อฐานข้อมูล...</p>
                        </div>
                    );
                }

                if (activeMenu === 'Dashboard' || activeMenu === 'โปรเจกต์') return <DashboardView tasks={tasks} currentUser={currentUser} onNavigate={handleNavigate} />;

                if (activeMenu === 'mywork') {
                    const userNameLower = String(currentUser?.name || '').trim().toLowerCase();
                    const myTasks = tasks.filter(t => {
                        const roleLower = String(currentUser?.role || '').toLowerCase();
                        const isHeadGraphic = roleLower.includes('หัวหน้ากราฟิก') || roleLower.includes('graphics head');
                        const isAdmin = roleLower.includes('admin') || roleLower.includes('ผู้ดูแลระบบ');

                        if (isAdmin || isHeadGraphic) return true;

                        if (roleLower.includes('กราฟิก')) {
                            return String(t.designer || '').toLowerCase().includes(userNameLower);
                        }
                        if (roleLower.includes('เซลล์')) {
                            return String(t.sales || '').toLowerCase().includes(userNameLower);
                        }
                        return false;
                    });
                    return <MyWorkView tasks={myTasks} currentUser={currentUser} onNavigate={handleNavigate} />;
                }
                if (activeMenu === 'drive') return <DriveView tasks={tasks} currentUser={currentUser} onNavigate={handleNavigate} />;

                // สังเกตว่าเราส่งตัวแปร currentUser ไปให้ TaskView ด้วย เพื่อให้รู้ว่าใครกำลังใช้งานอยู่
                if (activeMenu === 'Tasks') return <TaskView currentUser={currentUser} tasks={tasks} setTasks={setTasks} salesUsers={salesUsers} isLoadingSales={isLoadingSales} designerUsers={designerUsers} isLoadingDesigners={isLoadingDesigners} customerOptions={customerOptions} onUploadStart={startBackgroundUpload} notify={notify} initialFilter={taskFilter} clearInitialFilter={() => setTaskFilter(null)} />;

                if (activeMenu === 'คำนวณราคา') return <PriceCalculator notify={notify} />;

                // Mapping for Sidebar Menu Items:
                if (activeMenu === 'sub1') return <PriceCalculator notify={notify} />;      // Calculate Price
                if (activeMenu === 'calculate-material') return <CalculateMaterialView notify={notify} />; // Calculate Material
                if (activeMenu === 'sub3') return <CodeMaterialView />;      // Code Material

                return (
                    <div className="flex flex-col items-center justify-center h-full text-slate-300">
                        <Icon name="LayoutGrid" size={48} className="mb-4 opacity-50" />
                        <h2 className="text-2xl font-bold">หน้า {activeMenu}</h2>
                        <p>กำลังอยู่ระหว่างการพัฒนา</p>
                    </div>
                );
            };

            return (
                <div className="w-full h-full sm:rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.35)] overflow-hidden flex transition-colors duration-300" style={{ backgroundColor: theme.mode === 'light' ? '#F3F4F6' : (theme.mode === 'dark' ? '#0f172a' : theme.color) }}>
                    <Sidebar activeItem={activeMenu} onNavigate={(menu) => handleNavigate(menu)} onLogout={handleLogout} currentUser={currentUser} tasksCount={tasks.length} />
                    <BackgroundUploadTracker
                        uploads={activeUploads}
                        onRetry={retryUpload}
                        onRemove={removeUpload}
                    />
                    <main className="flex-1 flex flex-col relative transition-colors duration-300" style={{ backgroundColor: theme.mode === 'light' ? '#F3F4F6' : (theme.mode === 'dark' ? '#0f172a' : theme.color) }}>
                        <header className="h-16 px-6 flex items-center justify-between transition-colors duration-300" style={{ backgroundColor: theme.mode === 'light' ? '#F3F4F6' : (theme.mode === 'dark' ? '#0f172a' : theme.color) }}>
                            {/* Empty div to push right icons to the end since Search is removed */}
                            <div></div>

                            <div className="flex items-center gap-4 relative">
                                {/* Theme Picker Button */}
                                <div className="relative">
                                    <button
                                        onClick={() => setShowThemePicker(!showThemePicker)}
                                        className="p-2.5 rounded-full bg-white/50 hover:bg-white text-slate-500 hover:text-primary transition-all shadow-sm border border-slate-200"
                                        title="เปลี่ยนธีม"
                                    >
                                        <Icon name="Palette" size={18} />
                                    </button>

                                    {showThemePicker && (
                                        <div className="absolute right-0 top-full mt-3 w-64 bg-white/90 backdrop-blur-md rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.1)] border border-slate-100 p-4 z-[100] animate-in fade-in zoom-in duration-200">
                                            <div className="flex justify-between items-center mb-3">
                                                <h4 className="text-sm font-black text-slate-700">Theme Preference</h4>
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 mb-3">
                                                <button
                                                    onClick={() => { setTheme({ mode: 'light', color: '#F3F4F6' }); setShowThemePicker(false); }}
                                                    className={`hover:bg-slate-50 border transition-all rounded-xl p-3 flex flex-col items-center gap-2 ${theme.mode === 'light' ? 'border-primary bg-blue-50/50 shadow-inner' : 'border-slate-100'}`}
                                                >
                                                    <div className="w-6 h-6 rounded-full bg-slate-100 border-2 border-slate-300"></div>
                                                    <span className={`text-[11px] font-bold ${theme.mode === 'light' ? 'text-primary' : 'text-slate-500'}`}>Light</span>
                                                </button>
                                                <button
                                                    onClick={() => { setTheme({ mode: 'dark', color: '#0f172a' }); setShowThemePicker(false); }}
                                                    className={`hover:bg-slate-50 border transition-all rounded-xl p-3 flex flex-col items-center gap-2 ${theme.mode === 'dark' ? 'border-primary bg-blue-50/50 shadow-inner' : 'border-slate-100'}`}
                                                >
                                                    <div className="w-6 h-6 rounded-full bg-slate-900 border-2 border-slate-700"></div>
                                                    <span className={`text-[11px] font-bold ${theme.mode === 'dark' ? 'text-primary' : 'text-slate-500'}`}>Dark</span>
                                                </button>
                                            </div>
                                            <div className="p-3 bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-between">
                                                <label className="text-xs font-bold text-slate-600">Custom Color</label>
                                                <div className="relative">
                                                    <input
                                                        type="color"
                                                        value={theme.mode === 'custom' ? theme.color : '#ffffff'}
                                                        onChange={(e) => setTheme({ mode: 'custom', color: e.target.value })}
                                                        className="w-8 h-8 rounded-full cursor-pointer border-0 p-0 shadow-sm"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Bell Notification Button */}
                                <div className="relative">
                                    <button
                                        onClick={() => {
                                            if (!showNotifications) {
                                                // Marking all current unread tasks as seen when opening
                                                const currentNos = unreadTasks.map(t => t.no);
                                                setSeenTaskNos(prev => Array.from(new Set([...prev, ...currentNos])));
                                            }
                                            setShowNotifications(!showNotifications);
                                        }}
                                        className={`p-2.5 rounded-full transition-all shadow-sm border ${unreadTasks.filter(t => !seenTaskNos.includes(t.no)).length > 0 ? 'bg-red-50 hover:bg-red-100 text-red-500 border-red-200' : 'bg-white/50 hover:bg-white text-slate-500 border-slate-200 hover:text-primary'}`}
                                    >
                                        <Icon name="Bell" size={18} />
                                        {unreadTasks.filter(t => !seenTaskNos.includes(t.no)).length > 0 && (
                                            <span className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-[10px] font-black rounded-full border-2 border-white flex items-center justify-center animate-bounce shadow-md">
                                                {unreadTasks.filter(t => !seenTaskNos.includes(t.no)).length}
                                            </span>
                                        )}
                                    </button>

                                    {showNotifications && (
                                        <div className="absolute right-0 top-full mt-3 w-80 bg-white/95 backdrop-blur-md rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.1)] border border-slate-100 z-[100] animate-in fade-in slide-in-from-top-4 duration-200 overflow-hidden">
                                            <div className="px-4 py-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                                <h4 className="text-sm font-black text-[#1b2559]">Notifications</h4>
                                                <span className="bg-primary/10 text-primary text-[10px] font-bold px-2 py-0.5 rounded-full">{unreadTasks.filter(t => !openedTaskNos.includes(t.no)).length} New</span>
                                            </div>
                                            <div className="max-h-64 overflow-y-auto custom-scrollbar">
                                                {unreadTasks.length === 0 ? (
                                                    <div className="p-6 text-center text-slate-400">
                                                        <Icon name="CheckCircle" size={32} className="mx-auto mb-2 text-emerald-300" />
                                                        <p className="text-xs font-bold">ไม่มีการแจ้งเตือนใหม่</p>
                                                    </div>
                                                ) : (
                                                    unreadTasks.slice(0, 10).map((t, idx) => (
                                                        <div key={idx}
                                                            onClick={() => {
                                                                setOpenedTaskNos(prev => Array.from(new Set([...prev, t.no])));
                                                                handleNavigate('Tasks', t.no);
                                                                setShowNotifications(false);
                                                            }}
                                                            className="px-4 py-3 hover:bg-blue-50/50 cursor-pointer border-b border-slate-50 last:border-0 transition-colors relative"
                                                        >
                                                            {!openedTaskNos.includes(t.no) && (
                                                                <div className="absolute left-1 top-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-primary rounded-full shadow-[0_0_8px_rgba(79,102,254,0.6)]"></div>
                                                            )}
                                                            <div className="flex justify-between items-start mb-1">
                                                                <span className={`text-xs font-black ${openedTaskNos.includes(t.no) ? 'text-slate-400' : 'text-primary'}`}>{t.no}</span>
                                                                <span className="text-[10px] text-slate-400 font-medium">วันนี้</span>
                                                            </div>
                                                            <div className="text-sm text-slate-700 font-medium line-clamp-1">{t.product}</div>
                                                            <div className="text-[11px] text-slate-500 mt-1">ลูกค้า: <span className="font-bold">{t.customer}</span></div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                            <div
                                                className="px-4 py-2 border-t border-slate-100 text-center text-[11px] font-bold text-primary hover:bg-slate-50 cursor-pointer"
                                                onClick={() => { handleNavigate('Tasks'); setShowNotifications(false); }}
                                            >
                                                ดูงานทั้งหมด
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* User Profile Placeholder */}
                                <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center border border-slate-200 text-primary shadow-sm hover:scale-105 transition-transform cursor-pointer font-black text-sm overflow-hidden">
                                    {currentUser?.avatar ? (
                                        <img src={currentUser.avatar} alt="Profile" className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = ''; }} />
                                    ) : (
                                        currentUser?.name ? currentUser.name.substring(0, 2).toUpperCase() : <Icon name="User" size={18} />
                                    )}
                                </div>
                            </div>
                        </header>
                        <div className="flex-1 overflow-x-auto p-6 pt-0">
                            {renderContent()}
                        </div>
                    </main>
                    <ToastNotification notifications={notifications} removeNotification={removeNotification} />
                </div>
            );
        }

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                this.setState({ error: error, errorInfo: errorInfo });
                console.error("Uncaught error:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-10 bg-red-50 text-red-800 h-screen flex flex-col items-center justify-center">
                            <h1 className="text-2xl font-bold mb-4">เกิดข้อผิดพลาดในการแสดงผล</h1>
                            <p className="mb-2">กรุณาแคปหน้าจอนี้แจ้งผู้พัฒนา</p>
                            <pre className="bg-white p-4 rounded border border-red-200 text-xs overflow-auto max-w-2xl w-full">
                                {this.state.error && this.state.error.toString()}
                                <br />
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </pre>
                            <button
                                onClick={() => window.location.reload()}
                                className="mt-6 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors"
                            >
                                รีโหลดหน้าเว็บ
                            </button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        // --- 4. START RENDER ---
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        } catch (err) {
            console.error("Render Error:", err);
            document.body.innerHTML = '<div style="color:red; padding:20px;">เกิดข้อผิดพลาดในการแสดงผล (Root): ' + err.message + '</div>';
        }
    </script>
</body>

</html>
