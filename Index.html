<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/lucide@0.292.0/dist/umd/lucide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Prompt"', 'Inter', 'sans-serif'] },
                    colors: {
                        primary: '#6366F1', sidebar: '#F9FAFB', card: '#FFFFFF', bg: '#E5E7EB',
                        textMain: '#1F2937', textSub: '#9CA3AF',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 4px 14px 0 rgba(99, 102, 241, 0.39)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        body {
            font-family: 'Prompt', 'Inter', sans-serif;
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-right {
            animation: fadeInRight 0.4s ease-out forwards;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animate-fade-out {
            animation: fadeOut 0.3s ease-in forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        @keyframes pulse-critical {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.7);
            }

            70% {
                transform: scale(1.02);
                box-shadow: 0 0 0 10px rgba(204, 0, 0, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(204, 0, 0, 0);
            }
        }

        .animate-pulse-critical {
            animation: pulse-critical 2s infinite;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-800 antialiased overflow-hidden h-screen flex items-center justify-center p-4 sm:p-12">

    <div id="root" class="w-full h-full max-w-[1600px] max-h-[1000px]"></div>

    <script type="text/babel">
        // --- 1. MOCK DATA (ข้อมูลจำลอง) ---
        const MOCK_USERS = [
            { id: '1', name: 'Alice' },
            { id: '2', name: 'Bob' },
            { id: '3', name: 'Charlie' },
        ];

        // --- USER AVATAR MAPPING ---
        const USER_AVATARS = {
            'yotaya': 'https://lh3.googleusercontent.com/d/1fr7Zb51Y9WC9mulOU1c4YxElPtPB9qjf',
            'ticha': 'https://lh3.googleusercontent.com/d/1aABM95kvXydCJ-gonY0ahkh8plhfVdmv',
            'juthamas': 'https://lh3.googleusercontent.com/d/1PEXweFfQV5299nbbDQtSSlN4jhxGotzC',
            'kittipop': 'https://lh3.googleusercontent.com/d/1La8kcyVeLIi8EbZK23f6LRoQTxQhtXPW'
        };

        const INITIAL_DATA = [
            {
                id: 'working', title: 'กำลังทำ', count: 2,
                tasks: [
                    { id: 't1', title: 'Slack Rebrand', description: 'ปรับปรุงโลโก้และสี', tags: ['Design'], attachmentsCount: 3, commentsCount: 2, members: [MOCK_USERS[0]], imageUrl: 'https://picsum.photos/400/200', status: 'Working' },
                    { id: 't2', title: 'Google UX Research', description: 'วิจัยผู้ใช้กลุ่มใหม่', tags: ['Research'], attachmentsCount: 1, commentsCount: 5, members: [MOCK_USERS[1]], status: 'Working' }
                ]
            },
            {
                id: 'progress', title: 'ดำเนินการอยู่', count: 1,
                tasks: [{ id: 't3', title: 'Twitter Feed', description: 'แก้บั๊กหน้าฟีด', tags: ['Dev'], attachmentsCount: 0, commentsCount: 1, members: [MOCK_USERS[2]], status: 'In Progress' }]
            },
            {
                id: 'completed', title: 'เสร็จสิ้น', count: 1,
                tasks: [{ id: 't4', title: 'Tesla GPS', description: 'อัปเดตแผนที่', tags: ['Dev'], attachmentsCount: 8, commentsCount: 12, members: [MOCK_USERS[0]], status: 'Completed' }]
            }
        ];

        // --- Mock Data (Updated) ---
        // Setting dates relative to "now" for demonstration
        const now = new Date();
        const oneHourAgo = new Date(now.getTime() - (1 * 60 * 60 * 1000));
        const nineHoursAgo = new Date(now.getTime() - (9 * 60 * 60 * 1000));
        const twentyHoursAgo = new Date(now.getTime() - (20 * 60 * 60 * 1000));

        // Helper to format Date obj to string for mock data
        const formatMockDate = (d) => {
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `${day}/${month}/${year} ${hours}:${minutes}`;
        };

        const MOCK_TASKS_DATA = [
            { no: '20260218-001', date: formatMockDate(now), product: 'Website Redesign', sales: 'Alice', customer: 'TechCorp', user: 'admin', designer: 'Esther', status: 'Completed', detail: 'ออกแบบหน้าแรกใหม่ทั้งหมด' },
            { no: '20260218-002', date: formatMockDate(oneHourAgo), product: 'Mobile App Icon', sales: 'Bob', customer: 'StartUp Inc.', user: 'user1', designer: 'Esther', status: 'Pending', detail: 'ไอคอนแอป iOS และ Android' },
            { no: '20260217-010', date: formatMockDate(nineHoursAgo), product: 'Brochure', sales: 'Charlie', customer: 'RealEstate Co.', user: 'user2', designer: 'David', status: 'In Progress', detail: 'โบรชัวร์ 3 พับ ธีมสีน้ำเงิน' },
            { no: '20260217-005', date: formatMockDate(twentyHoursAgo), product: 'Social Media Ads', sales: 'Alice', customer: 'Fashion Brand', user: 'admin', designer: 'Esther', status: 'Pending', detail: 'ภาพโฆษณา Facebook 5 ภาพ' },
            { no: '20260216-169', date: formatMockDate(twentyHoursAgo), product: 'Logo Design', sales: 'David', customer: 'Coffee Shop', user: 'user3', designer: 'Sarah', status: 'Completed', detail: 'โลโก้ร้านกาแฟสไตล์มินิมอล' },
        ];

        // --- 2. COMPONENTS ---

        // Icon Component (ตัวช่วยแสดงไอคอน)
        const Icon = ({ name, ...props }) => {
            try {
                // ตรวจสอบว่า lucide โหลดมาหรือยัง
                if (!window.lucide || !window.lucide.icons) {
                    console.warn("Lucide icons not loaded yet");
                    return <span className="text-xs">?</span>;
                }
                const IconComponent = window.lucide.icons[name];
                if (!IconComponent) return null;

                // สร้าง SVG จากข้อมูล Lucide
                return React.createElement('svg', {
                    ...props,
                    width: props.size || 24, height: props.size || 24,
                    fill: "none", stroke: "currentColor", strokeWidth: props.strokeWidth || 2,
                    strokeLinecap: "round", strokeLinejoin: "round", viewBox: "0 0 24 24",
                    dangerouslySetInnerHTML: { __html: IconComponent[2].map(c => `<${c[0]} ${Object.entries(c[1]).map(([k, v]) => `${k}="${v}"`).join(' ')} />`).join('') }
                });
            } catch (e) {
                console.error("Icon Error:", e);
                return null;
            }
        };

        // --- UPDATED SIDEBAR COMPONENT (New Design: Wider, Text-based) ---
        const Sidebar = ({ activeItem, onNavigate, onLogout, currentUser, tasksCount = 0 }) => {
            const [isCalcExpanded, setIsCalcExpanded] = React.useState(false);
            const [expandedItems, setExpandedItems] = React.useState(['Product']); // Default expand Product

            // Notification logic
            const [lastSeenCount, setLastSeenCount] = React.useState(() => {
                return parseInt(localStorage.getItem('tasks_last_seen') || '0', 10);
            });

            const unreadCount = Math.max(0, tasksCount - lastSeenCount);

            const handleTasksClick = () => {
                localStorage.setItem('tasks_last_seen', tasksCount.toString());
                setLastSeenCount(tasksCount);
                onNavigate('Tasks');
            };

            // Essentials Menu
            const essentials = [
                { icon: 'LayoutGrid', label: 'Dashboard', value: 'Dashboard' },
                { icon: 'User', label: 'My Work', value: 'mywork' },
                { icon: 'CheckSquare', label: 'Tasks', value: 'Tasks', badge: unreadCount },
                {
                    icon: 'Layers',
                    label: 'Product', // Renamed from 'Threads'
                    value: 'Product',
                    subItems: [
                        { label: 'Calculate Price', value: 'คำนวณราคา', icon: 'Folder' },
                        { label: 'Calculate Material', value: 'calculate-material', icon: 'Calculator' },
                        { label: 'Code Material', value: 'sub3', icon: 'Folder' }
                    ]
                }
            ];

            // Projects Menu (Mock Data)
            const projects = [
                { color: 'bg-emerald-500', label: 'Atlas CRM Revamp', value: 'p1' },
                { color: 'bg-orange-500', label: 'Nimbus Dashboard', value: 'p2' },
                { color: 'bg-blue-500', label: 'Orion API Gateway', value: 'p3' },
                { color: 'bg-red-500', label: 'Helio Task System', value: 'p4' },
            ];

            return (
                <div className="w-64 h-full flex flex-col bg-white border-r border-slate-200 z-50">
                    {/* MacOS Style Traffic Lights */}
                    <div className="px-6 pt-6 flex gap-1.5">
                        <div className="w-3 h-3 rounded-full bg-[#FF5F56] border border-[#E0443E]"></div>
                        <div className="w-3 h-3 rounded-full bg-[#FFBD2E] border border-[#DEA123]"></div>
                        <div className="w-3 h-3 rounded-full bg-[#27C93F] border border-[#1AAB29]"></div>
                    </div>

                    {/* 0. Logo (Restored) */}
                    <div className="p-6 pb-2 flex items-center justify-center">
                        <img src="https://lh3.googleusercontent.com/d/16NY9MJ3jLU3ao6doEVDf0T_LjhsktXqp" className="h-12 w-auto object-contain hover:scale-110 transition-transform cursor-pointer" alt="Logo" />
                    </div>

                    {/* 1. Search Bar */}
                    <div className="px-6 py-2">
                        <div className="relative">
                            <Icon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                            <input
                                type="text"
                                placeholder="Search"
                                className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"
                            />
                            <div className="absolute right-3 top-1/2 -translate-y-1/2 border border-slate-300 rounded px-1.5 py-0.5 text-[10px] text-slate-400 font-medium">⌘F</div>
                        </div>
                    </div>

                    {/* 2. Essentials Menu */}
                    <div className="px-4 py-4">
                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-2">Essentials</h3>
                        <nav className="space-y-1">
                            {essentials.map((item) => {
                                // Check if this item is active or one of its children is active
                                const isParentActive = activeItem === item.value || (item.subItems && item.subItems.some(sub => sub.value === activeItem));
                                const isExpanded = expandedItems.includes(item.value);

                                const handleItemClick = () => {
                                    if (item.subItems) {
                                        setExpandedItems(prev =>
                                            prev.includes(item.value)
                                                ? prev.filter(v => v !== item.value)
                                                : [...prev, item.value]
                                        );
                                    } else {
                                        if (item.value === 'Tasks') {
                                            handleTasksClick();
                                        } else {
                                            onNavigate(item.value);
                                        }
                                    }
                                };

                                return (
                                    <div key={item.label}>
                                        <div
                                            onClick={handleItemClick}
                                            className={`
                                                flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer transition-all duration-200 group
                                                ${isExpanded
                                                    ? 'bg-[#1B2559] text-white'
                                                    : (activeItem === item.value ? 'bg-slate-50 text-slate-900 font-semibold' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-700')
                                                }
                                            `}
                                        >
                                            <div className="flex items-center gap-3">
                                                <Icon name={item.icon} size={20} className={isExpanded ? 'text-white' : (activeItem === item.value ? 'text-primary' : 'text-slate-400 group-hover:text-slate-600')} />
                                                <span>{item.label}</span>
                                            </div>
                                            {item.subItems ? (
                                                <Icon name={isExpanded ? "Minus" : "Plus"} size={16} className={isExpanded ? "text-slate-400" : "text-slate-400"} />
                                            ) : (
                                                item.badge > 0 && (
                                                    <span className="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-md font-medium border border-slate-200">
                                                        {item.badge}
                                                    </span>
                                                )
                                            )}
                                        </div>

                                        {/* Sub-menu */}
                                        {item.subItems && isExpanded && (
                                            <div className="pl-4 mt-2 relative">
                                                {/* Vertical Line */}
                                                <div className="absolute left-[21px] top-0 bottom-2 w-[1px] bg-slate-200"></div>

                                                <div className="space-y-1 pl-4">
                                                    {item.subItems.map((sub) => {
                                                        const isSubActive = activeItem === sub.value;
                                                        return (
                                                            <div
                                                                key={sub.value}
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    onNavigate(sub.value);
                                                                }}
                                                                className={`
                                                                    flex items-center gap-3 px-3 py-2 rounded-full cursor-pointer transition-all text-sm relative z-10
                                                                    ${isSubActive ? 'bg-white shadow-sm ring-1 ring-slate-100 text-slate-900 font-medium' : 'text-slate-500 hover:text-slate-800'}
                                                                `}
                                                            >
                                                                <Icon name={sub.icon} size={16} className={isSubActive ? 'text-slate-900' : 'text-slate-400'} />
                                                                <span>{sub.label}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </nav>
                    </div>


                    {/* 4. User Profile (Bottom) */}
                    <div className="mt-auto p-4 border-t border-slate-100">
                        <div className="flex items-center gap-3 p-3 rounded-2xl bg-white border border-slate-100 shadow-sm relative group overflow-hidden">
                            <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200 text-slate-500 shrink-0 overflow-hidden">
                                {currentUser?.name && USER_AVATARS[currentUser.name.toLowerCase()] ? (
                                    <img src={USER_AVATARS[currentUser.name.toLowerCase()]} className="w-full h-full object-cover" alt={currentUser.name} />
                                ) : (
                                    <Icon name="User" size={20} />
                                )}
                            </div>
                            <div className="flex-1 min-w-0 pr-10">
                                <div className="text-sm font-black text-[#1b2559] truncate">{currentUser?.name || 'Guest'}</div>
                                <div className="text-[11px] font-bold text-slate-400 truncate">{currentUser?.role || 'Guest'}</div>
                            </div>

                            <div className="absolute right-3 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white pl-2">
                                <button onClick={() => onNavigate('drive')} className="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Drive (คลังไฟล์)">
                                    <Icon name="HardDrive" size={16} />
                                </button>
                                <button onClick={onLogout} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="ออกจากระบบ">
                                    <Icon name="LogOut" size={16} />
                                </button>
                            </div>
                            {/* Default arrow shown when not hovered to match Image 1 */}
                            <div className="absolute right-4 text-slate-300 group-hover:opacity-0 transition-opacity">
                                <Icon name="LogOut" size={16} />
                            </div>
                        </div>
                    </div>
                </div>


            );
        };
        const ProjectCard = ({ task }) => (
            <div className="bg-white p-4 rounded-2xl shadow-soft hover:shadow-md transition-all cursor-pointer mb-4 border border-slate-50">
                {task.imageUrl && (
                    <div className="mb-3 rounded-xl overflow-hidden h-28 w-full relative group">
                        <img src={task.imageUrl} className="w-full h-full object-cover" />
                    </div>
                )}
                <div className="flex justify-between items-start mb-1">
                    <h3 className="font-bold text-slate-800">{task.title}</h3>
                    <Icon name="MoreHorizontal" size={18} className="text-slate-300" />
                </div>
                <p className="text-slate-500 text-xs mb-3 line-clamp-2">{task.description}</p>
                <div className="flex items-center justify-between pt-2 border-t border-slate-50">
                    <div className="flex gap-2 text-slate-400 text-xs">
                        <span className="flex items-center gap-1"><Icon name="Paperclip" size={12} /> {task.attachmentsCount}</span>
                    </div>
                    <div className="flex -space-x-2">
                        {task.members.map((m, i) => (
                            <div key={i} className="w-5 h-5 rounded-full border border-white bg-slate-100 flex items-center justify-center text-[8px] font-bold text-slate-500">
                                {m.name ? m.name.charAt(0).toUpperCase() : '?'}
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        // --- Material Calculator Component ---
        // --- Base Layout Component (UI มาตรฐาน) ---
        const CalculatorLayout = ({
            title,
            subtitle = "ระบุข้อมูลเพื่อคำนวณราคา",
            onBack,
            children,
            cartItems,
            setCartItems,
            total = 0,
            vat = 0,
            grandTotal = 0,
            onAddToOrder,
            loading = false
        }) => {
            return (
                <div className="flex flex-col lg:flex-row h-full gap-6 p-2 animate-fade-in-right">
                    {/* Left Panel: Input Form */}
                    <div className="flex-1 bg-white rounded-[24px] p-8 shadow-soft flex flex-col relative overflow-y-auto custom-scrollbar">
                        <button onClick={onBack} className="absolute top-8 right-8 text-slate-400 hover:text-slate-600 flex items-center gap-1 text-sm font-bold">
                            <Icon name="ArrowLeft" size={16} /> ย้อนกลับ
                        </button>

                        <h2 className="text-2xl font-bold text-slate-800 mb-1">{title}</h2>
                        <p className="text-slate-400 text-sm mb-6">{subtitle} {loading && <span className="text-primary ml-2 animate-pulse">กำลังโหลดข้อมูล...</span>}</p>

                        {/* Form Content */}
                        <div className="flex-1">
                            {children}
                        </div>

                        {/* Live Estimate Footer */}
                        <div className="mt-8 pt-6 border-t border-slate-100">
                            <div className="flex justify-between items-end mb-4">
                                <div className="text-sm text-slate-500">รวมเป็นเงิน</div>
                                <div className="text-xl font-bold text-slate-800">฿{total.toLocaleString(undefined, { minimumFractionDigits: 2 })}</div>
                            </div>
                            <div className="flex justify-between items-end mb-4">
                                <div className="text-sm text-slate-500">ภาษีมูลค่าเพิ่ม 7%</div>
                                <div className="text-xl font-bold text-slate-600">฿{vat.toLocaleString(undefined, { minimumFractionDigits: 2 })}</div>
                            </div>
                            <div className="flex justify-between items-end mb-6 p-4 bg-primary/5 rounded-xl border border-primary/10">
                                <div className="font-bold text-primary">ราคาสุทธิ (Grand Total)</div>
                                <div className="text-3xl font-bold text-primary">฿{grandTotal.toLocaleString(undefined, { minimumFractionDigits: 2 })}</div>
                            </div>

                            <button onClick={onAddToOrder} className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-700 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-slate-300/50">
                                <Icon name="Plus" size={20} /> เพิ่มรายการคำนวณ
                            </button>
                        </div>
                    </div>

                    {/* Right Panel: Quotation / Cart */}
                    <div className="hidden lg:flex w-[400px] bg-white rounded-[24px] shadow-soft flex-col overflow-hidden">
                        <div className="p-6 border-b border-slate-50 bg-slate-50/50 flex items-center gap-3">
                            <div className="p-2 bg-primary/10 text-primary rounded-lg"><Icon name="ShoppingCart" size={20} /></div>
                            <div><h3 className="font-bold text-slate-800">รายการที่เลือก</h3><p className="text-xs text-slate-400">{cartItems.length} รายการ</p></div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 custom-scrollbar">
                            {cartItems.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-60">
                                    <div className="bg-slate-50 p-6 rounded-full mb-4"><Icon name="ShoppingCart" size={40} /></div>
                                    <p className="font-medium">ยังไม่มีรายการ</p>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {cartItems.map(item => (
                                        <div key={item.id} className="relative group p-4 border border-slate-100 rounded-2xl hover:border-primary/30 transition-all bg-slate-50/30">
                                            <button onClick={() => setCartItems(cartItems.filter(x => x.id !== item.id))} className="absolute top-2 right-2 text-slate-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="X" size={16} /></button>
                                            <h4 className="font-bold text-slate-700 text-sm mb-1">{item.name}</h4>
                                            <p className="text-xs text-slate-500 mb-2">{item.desc}</p>
                                            <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-100/50">
                                                <span className="text-xs font-bold text-slate-400">จำนวน: {item.qty}</span>
                                                <span className="font-bold text-slate-800">฿{item.price.toLocaleString()}</span>

        // --- Printing Calculator ---
        const PrintingCalculator = ({ onBack }) => {
            // State
            const [width, setWidth] = React.useState('');
            const [length, setLength] = React.useState('');
            const [quantity, setQuantity] = React.useState(1);

            const [printType, setPrintType] = React.useState('inkjet'); // inkjet, uv, hp
            const [material, setMaterial] = React.useState('');

            const [options, setOptions] = React.useState({
                diecut: false,
                whiteInk: false,
                coating: 'none', // none, normal, 3m
                urgent: false
            });

            const [cartItems, setCartItems] = React.useState([]);
            const [rawData, setRawData] = React.useState([]); // Store Raw Data
            const [helperData, setHelperData] = React.useState([]); // Store Helper Data
            const [loading, setLoading] = React.useState(true);

            // Fetch Data
            React.useEffect(() => {
                const fetchData = async () => {
                    if (window.google && window.google.script) {
                        try {
                            window.google.script.run
                                .withSuccessHandler(response => {
                                    if (response.success) {
                                        setRawData(response.rawData || []);
                                        setHelperData(response.helperData || []);
                                    }
                                    setLoading(false);
                                })
                                .getPrintingRawData();
                        } catch (e) {
                            console.error("Script run error:", e);
                            setLoading(false);
                        }
                    } else {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            // Calculation Logic
            const calculatePrice = () => {
                const w = parseFloat(String(width).replace(/,/g, '')) || 0;
                const l = parseFloat(String(length).replace(/,/g, '')) || 0;
                const q = parseFloat(String(quantity).replace(/,/g, '')) || 0;

                // 1. หาพื้นที่รวม
                const areaPerPiece = w * l;
                const totalArea = areaPerPiece * q;

                if (totalArea <= 0 || !helperData || helperData.length === 0 || !rawData || !material) {
                    return { subtotal: 0, vat: 0, netTotal: 0 };
                }

                let basePricePerSqm = 0;
                let addonPricePerSqm = 0;

                // --- 1. ค้นหาคอลัมน์ของวัสดุที่เลือก (จากชีต 'ช่วยคำนวนงานพิมพ์') ---
                // ข้อมูลหัวตารางชื่อวัสดุจะอยู่ในแถวที่ 1 (index 0 ของ Array)
                const headerRow = helperData[0];
                let materialColIndex = -1;

                if (headerRow) {
                    const targetMaterial = String(material).trim();
                    // วนลูปหาคอลัมน์ที่ชื่อวัสดุตรงกับที่เลือก (เริ่มหาตั้งแต่คอลัมน์ A เป็นต้นไป)
                    for (let c = 0; c < headerRow.length; c++) {
                        const cellValue = String(headerRow[c] || '').trim();
                        // เปลี่ยนจาก .replace(/\s+/g, '') เป็น .trim() เพราะตารางมีการเว้นวรรค
                        if (cellValue === targetMaterial) {
                            materialColIndex = c;
                            break;
                        }
                    }
                }

                // --- 2. หา Base Price จากตารางเรทพื้นที่และเครื่องพิมพ์ ---
                if (materialColIndex !== -1) {
                    // วนลูปเช็คช่วงตารางเมตร เริ่มแถวที่ 3 (index 2) ไปเรื่อยๆ จนสุดตาราง
                    for (let i = 2; i < helperData.length; i++) {
                        const rowData = helperData[i];
                        if (!rowData) continue;

                        const rateArea = Number(rowData[28]); // Col AC: เรทตารางเมตร
                        const type = String(rowData[1] || '').trim().toLowerCase(); // Col B: ประเภทเครื่อง

                        const currentPrintType = String(printType).trim().toLowerCase();

                        // เงื่อนไข: เครื่องพิมพ์ตรงกัน และ พื้นที่งานถึงเรทขั้นต่ำของแถวนั้น
                        if (type === currentPrintType && totalArea >= rateArea) {
                            basePricePerSqm = Number(rowData[materialColIndex]) || 0;
                        }
                    }
                }

                // --- 3. หาค่าออปชันเสริมจากชีต "Raw data งานพิมพ์" แถว 63 (index 62) ---
                if (rawData.length > 62) {
                    const optionRow = rawData[62];
                    if (optionRow) {
                        // NOTE: จาก Log ที่พิมพ์ออกมา
                        // [AA/26] หัวตาราง=ลงขาว, ราคา=100
                        // [AB/27] หัวตาราง=ไดคัท, ราคา=30
                        // สลับ Index 26 กับ 27 ให้ตรงตามชื่อที่สแกนเจอจริงๆ
                        if (options.diecut) addonPricePerSqm += Number(optionRow[27] || 0);    // AB63: ไดคัท
                        if (options.whiteInk) addonPricePerSqm += Number(optionRow[26] || 0);  // AA63: ลงขาว

                        if (options.coating === 'normal') addonPricePerSqm += Number(optionRow[28] || 0); // AC63: เคลือบ ฟูซุ่น/จีน
                        if (options.coating === '3m') addonPricePerSqm += Number(optionRow[29] || 0);     // AD63: เคลือบ 3 m
                    }
                }

                // --- 4. สรุปราคารวม ---
                let subtotal = totalArea * (basePricePerSqm + addonPricePerSqm);

                // บวกรถด่วน 30% ถ้ามี
                if (options.urgent) {
                    subtotal = subtotal * 1.3;
                }

                const vat = subtotal * 0.07;
                const netTotal = subtotal + vat;

                return {
                    subtotal: subtotal,
                    vat: vat,
                    netTotal: netTotal
                };
            };

            const price = calculatePrice();

                    qty: quantity,

                };
                setCartItems([...cartItems, newItem]);
            };

            return (
                <CalculatorLayout
                    title="งานพิมพ์ (Printing Work)"

                    onAddToOrder={addToQuote}

                >

                            <label className="block text-xs font-bold text-slate-500 mb-2">ความกว้าง (ม.)</label>
                            <select
                                value={width}
                                onChange={e => setWidth(e.target.value)}
                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 focus:ring-2 focus:ring-primary/20 outline-none appearance-none"
                            >
                                <option value="" disabled>-- เลือกกว้าง --</option>
                                {[1.02, 1.12, 1.22, 1.32, 1.52, 1.62, 1.82, 2.02, 2.12, 2.2, 2.5, 2.6, 2.8, 3.2].map(w => (
                                    <option key={w} value={w}>{w}</option>
                                ))}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-2">ความยาว (ม.)</label>
                            <input type="number" value={length} onChange={e => setLength(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none" placeholder="0.00" />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-2">จำนวน (ชิ้น)</label>
                            <input type="number" value={quantity} onChange={e => setQuantity(Number(e.target.value))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none" placeholder="1" min="1" />
                        </div>

                        <label className="block text-xs font-bold text-slate-500 mb-3">ประเภทเครื่องพิมพ์</label>

                // 5. Grand Total
                const grandTotal = subtotal + laborCost;

                return {
                    totalMaterial,
                    profitAmount,
                    subtotal,
                    laborCost,
                    grandTotal
                };

        // --- Task View Component ---
        // --- Helper Functions ---
        const generateOrderID = (allTasks) => {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const prefix = `${yyyy}${mm}${dd}`; // e.g., 20260218
            const monthPrefix = `${yyyy}${mm}`; // e.g., 202602

            // Calculate run number within the current month
            // Filter tasks that belong to this month to find the max run number
            const monthlyTasks = allTasks.filter(t => t.no.startsWith(monthPrefix));

            let nextRun = 1;
            if (monthlyTasks.length > 0) {
                // Extract the run number (last 3 digits) and find max
                const maxRun = monthlyTasks.reduce((max, t) => {
                    const parts = t.no.split('-');
                    if (parts.length === 2 && !isNaN(parts[1])) {
                        return Math.max(max, parseInt(parts[1], 10));
                    }
                    return max;
                }, 0);
                nextRun = maxRun + 1;
            }

            const runNumber = String(nextRun).padStart(3, '0');
            return `${prefix}-${runNumber}`;
        };

        const formatDate = (dateString = null) => {
            const date = dateString ? new Date(dateString) : new Date();
            // Format: DD/MM/YYYY HH:mm
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${day}/${month}/${year} ${hours}:${minutes}`;
        };

        const normalizeDate = (dateStr) => {
            if (!dateStr) return dateStr;
            if (typeof dateStr !== 'string') dateStr = String(dateStr);
            dateStr = dateStr.trim();

            // Handle "DD/MM/YYYY HH:mm" or "DD/MM/YYYY"
            const dateTimeParts = dateStr.split(' ');
            const datePart = dateTimeParts[0];

            if (!datePart || !datePart.includes('/')) return dateStr;

            try {
                const dateParts = datePart.split('/');
                if (dateParts.length < 3) return dateStr;

                let day = dateParts[0].padStart(2, '0');
                let month = dateParts[1].padStart(2, '0');
                let yearStr = dateParts[2];
                let year = parseInt(yearStr);

                if (isNaN(year)) return dateStr;

                // UNIVERSAL YEAR NORMALIZATION:
                // If it's BE (> 2500), convert to AD (-543)
                // If it's short year (e.g. 26 or 69), expand to full year based on threshold
                if (year > 2500) {
                    year -= 543;
                } else if (year > 250) { // 2568, 2569
                    year -= 543;
                } else if (year < 100) {
                    // 69 (BE) or 26 (AD)
                    // If > 50, assume it's BE shorthand (e.g. 69 -> 2569 -> 2026)
                    // If <= 50, assume it's AD shorthand (e.g. 26 -> 2026)
                    if (year > 50) year = (year + 2500) - 543;
                    else year += 2000;
                }

                return `${day}/${month}/${year}`;
            } catch (err) {
                console.error("Date normalization error:", err);
                return dateStr;
            }
        };

        const calculateBusinessHours = (startStr, end) => {
            const normalizedStart = normalizeDate(startStr);
            if (!normalizedStart) return 0;

            // Parse DD/MM/YYYY HH:mm
            const parts = startStr.split(' ');
            const datePart = parts[0];
            const timePart = parts[1] || '08:30';

            const [d, m, yStr] = datePart.split('/');
            const [h, min] = timePart.split(':');
            let year = parseInt(yStr);
            if (year > 2500) year -= 543;
            else if (year < 100) year = (year > 50) ? (year + 2500 - 543) : (year + 2000);

            const start = new Date(year, m - 1, d, h || 8, min || 30);
            if (end < start) return 0;

            let totalMs = 0;
            const getWorkSegments = (date) => {
                const d = new Date(date);
                const s1 = new Date(d).setHours(8, 30, 0, 0);
                const e1 = new Date(d).setHours(12, 0, 0, 0);
                const s2 = new Date(d).setHours(13, 0, 0, 0);
                const e2 = new Date(d).setHours(17, 30, 0, 0);
                return [[s1, e1], [s2, e2]];
            };

            let current = new Date(start);
            // Limit loop to prevent potential infinite loops if dates are weird
            let safetyCounter = 0;
            while (current.toDateString() !== end.toDateString() && safetyCounter < 31) {
                const segments = getWorkSegments(current);
                segments.forEach(([s, e]) => {
                    const overlapStart = Math.max(current.getTime(), s);
                    const overlapEnd = e;
                    if (overlapEnd > overlapStart) {
                        totalMs += (overlapEnd - overlapStart);
                    }
                });
                // Move to next day 08:30
                current.setDate(current.getDate() + 1);
                current.setHours(8, 30, 0, 0);
                safetyCounter++;
            }

            // Same day or last day
            const segments = getWorkSegments(current);
            segments.forEach(([s, e]) => {
                const overlapStart = Math.max(current.getTime(), s);
                const overlapEnd = Math.min(end.getTime(), e);
                if (overlapEnd > overlapStart) {
                    totalMs += (overlapEnd - overlapStart);
                }
            });

            return totalMs / (1000 * 60 * 60);
        };

        const getElapsedTimeColor = (dateString, status) => {
            if (!dateString) return 'bg-slate-100 text-slate-700';

            // Completed status is blue
            if (status === 'ดำเนินการแล้วเสร็จ' || status === 'Completed' || status === 'เสร็จสิ้น') return 'bg-[#00B0F0] text-white font-bold';

            // Apply coloring if status is 'รอดำเนินการ' or 'ดำเนินการอยู่'
            const activeStatuses = ['รอดำเนินการ', 'ดำเนินการอยู่', 'Pending', 'In Progress', 'กำลังดำเนินการ', 'รอเซลล์สรุป', 'รอกำหนดระยะเวลาผลิต'];
            if (!activeStatuses.includes(status)) return 'bg-slate-100 text-slate-700';

            const now = new Date();
            const diffHours = calculateBusinessHours(dateString, now);
            const displayHours = Math.floor(diffHours);

            // New Thresholds for 48-hour tracking
            if (diffHours < 8) return `bg-[#33CC33] text-black font-bold`; // Green
            if (diffHours < 24) return `bg-[#FFFF00] text-black font-bold`; // Yellow
            if (diffHours < 48) return `bg-[#FF9900] text-white font-bold`; // Orange
            return `bg-[#CC0000] text-white font-bold animate-pulse-critical`; // Dark Red + Pulse
        };

            const gradientClasses = color.includes("from-white") ? "" : `bg-gradient-to-br ${color}`;

                    <div className="relative z-10">
                        <p className={`text-[10px] font-black uppercase tracking-widest mb-1 ${color.includes("from-white") ? "text-slate-400" : "text-white/70"}`}>{subtitle}</p>
                        <h4 className={`text-sm font-bold ${color.includes("from-white") ? "text-slate-600" : "text-white"} mb-1`}>{title}</h4>
                        {isGoal ? (

                                    ></div>

                            <h4 className={`text-3xl font-black ${textColor}`}>{value}</h4>
                        )}
                        {status && (
                            <div className={`flex items-center gap-2 text-[10px] bg-white/20 w-fit px-3 py-1.5 rounded-full backdrop-blur-md border border-white/10 font-bold mt-2`}>
                                <Icon name="Clock" size={14} /> <span>{status}</span>

        // --- File Preview Modal Component ---
        const FilePreviewModal = ({ file, onClose }) => {

        const compressImage = (file, type = 'initial') => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Targeted quality: 4K for completion, 1200px for initial
                        const max_size = type === 'completion' ? 3840 : 1200;
                        const quality = type === 'completion' ? 1.0 : 0.8;

                        if (width > height) {
                            if (width > max_size) {
                                height *= max_size / width;
                                width = max_size;
                            }
                        } else {
                            if (height > max_size) {
                                width *= max_size / height;
                                height = max_size;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

            const [draggingField, setDraggingField] = React.useState(null);

            const [dragOffset, setDragOffset] = React.useState({ x: 0, y: 0 });

            // Handle Drag & Drop Logic for Layout Mode
            const handleDragStart = (e, field) => {
                if (!isLayoutMode) return;
                setDraggingField(field);

                // Record offset so it doesn't jump
                const rect = e.currentTarget.getBoundingClientRect();
                setDragOffset({
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                });

                e.preventDefault();
            };

            const handleDragging = React.useCallback((e) => {
                if (!draggingField) return;
                const container = document.getElementById('pdf-preview-container');
                if (!container) return;

                const rect = container.getBoundingClientRect();

                // Calculate new position using the recorded offset
                let x = ((e.clientX - dragOffset.x - rect.left) / rect.width) * 100;
                let y = ((e.clientY - dragOffset.y - rect.top) / rect.height) * 100;

                // Adjust for text alignment if not an area
                // (Text boxes are translated(0, -50%), so the dragging feels more natural if we stay consistent)

                // Lock within boundaries
                x = Math.max(0, Math.min(100, x));
                y = Math.max(0, Math.min(100, y));

                setFieldPositions(prev => {
                    const current = prev[draggingField];
                    const newData = { ...prev };

                    // Calculate deltas
                    const deltaX = parseFloat(x.toFixed(3)) - current.left;
                    const deltaY = parseFloat(y.toFixed(3)) - current.top;

                    if (current.right !== undefined && current.bottom !== undefined) {
                        // Move AREA: Offset 'right' and 'bottom' inversely to preserve size
                        newData[draggingField] = {
                            ...current,
                            top: parseFloat(y.toFixed(3)),
                            left: parseFloat(x.toFixed(3)),
                            right: parseFloat((current.right - deltaX).toFixed(3)),
                            bottom: parseFloat((current.bottom - deltaY).toFixed(3))
                        };
                    } else {
                        // Move TEXT: Standard top/left
                        newData[draggingField] = {
                            ...current,
                            top: parseFloat(y.toFixed(3)),
                            left: parseFloat(x.toFixed(3))
                        };
                    }
                    return newData;
                });
            }, [draggingField, dragOffset]);

            const handleDragEnd = () => setDraggingField(null);

            React.useEffect(() => {
                if (draggingField) {
                    window.addEventListener('mousemove', handleDragging);
                    window.addEventListener('mouseup', handleDragEnd);
                } else {
                    window.removeEventListener('mousemove', handleDragging);
                    window.removeEventListener('mouseup', handleDragEnd);
                }
                return () => {
                    window.removeEventListener('mousemove', handleDragging);
                    window.removeEventListener('mouseup', handleDragEnd);

            }, [draggingField, handleDragging]);

            // Keyboard Fine-Tuning
            React.useEffect(() => {
                const handleKeyDown = (e) => {

                    const step = e.shiftKey ? 0.05 : 0.5; // Shift for micro-adjust
                    let deltaTop = 0;
                    let deltaLeft = 0;

                    if (e.key === 'ArrowUp') deltaTop = -step;
                    if (e.key === 'ArrowDown') deltaTop = step;
                    if (e.key === 'ArrowLeft') deltaLeft = -step;
                    if (e.key === 'ArrowRight') deltaLeft = step;

                    if (deltaTop !== 0 || deltaLeft !== 0) {

                            if (current.right !== undefined && current.bottom !== undefined) {

                                newData[selectedField] = {
                                    ...current,
                                    top: parseFloat(Math.max(0, Math.min(100, current.top + deltaTop)).toFixed(3)),

                                    right: parseFloat(Math.max(0, Math.min(100, current.right - deltaLeft)).toFixed(3)),
                                    bottom: parseFloat(Math.max(0, Math.min(100, current.bottom - deltaTop)).toFixed(3))
                                };

                                    ...current,
                                    top: parseFloat(Math.max(0, Math.min(100, current.top + deltaTop)).toFixed(3)),
                                    left: parseFloat(Math.max(0, Math.min(100, current.left + deltaLeft)).toFixed(3))
                                };
                            }

                        });
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [selectedField, isLayoutMode, draggingField]);


            const handleFileSelect = async (e, type = 'initial') => {
                const files = Array.from(e.target.files);
                const currentFiles = type === 'completion' ? completionFiles : selectedFiles;

                if (currentFiles.length + files.length > 20) {
                    alert("แนบไฟล์ได้ไม่เกิน 20 ไฟล์ครับ");
                    return;
                }

                setIsUploading(true);
                try {
                    const processed = await Promise.all(files.map(async (file) => {
                        // ไม่รับวิดีโอ
                        if (file.type.startsWith('video/')) {
                            throw new Error('ระบบไม่รองรับไฟล์วิดีโอครับ');
                        }

                        // ถ้าเป็นรูปภาพ -> บีบอัด
                        if (file.type.startsWith('image/')) {
                            return await compressImage(file, type);
                        }

                        // ถ้าเป็นไฟล์อื่น (PDF, ZIP, DOCX) -> อ่านเป็น DataURL โดยตรง
                        return new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = (ev) => resolve(ev.target.result);
                            reader.onerror = () => reject(new Error('โหลดไฟล์ล้มเหลว'));
                            reader.readAsDataURL(file);
                        });
                    }));

                    if (type === 'completion') {
                        setCompletionFiles(prev => [...prev, ...processed]);
                    } else {
                        setSelectedFiles(prev => [...prev, ...processed]);
                    }
                } catch (err) {
                    notify(err.message, 'error');
                } finally {
                    setIsUploading(false);
                }
            };

            // เรียกใช้ชื่อฟังก์ชันให้ตรงกับที่เรียกในบางจุดและรองรับ Completion
            const handleCompletionFileChange = (e) => handleFileSelect(e, 'completion');

            const removeFile = (index, type = 'initial') => {
                if (type === 'completion') {
                    setCompletionFiles(prev => prev.filter((_, i) => i !== index));
                } else {
                    setSelectedFiles(prev => prev.filter((_, i) => i !== index));
                }
            };

            const removeImage = (index) => removeFile(index, 'initial');
            const removeCompletionImage = (index) => removeFile(index, 'completion');

            // ฟังก์ชันสำหรับรวมข้อมูลแล้วดาวน์โหลด (PDF หรือ JPEG)
            const handleDownload = async (format = 'pdf') => {
                const docElement = document.getElementById('fm-gp-03-document');
                if (!docElement) {
                    alert("กรุณารอเทมเพลตโหลดเสร็จก่อนครับ");
                    return;
                }

                setIsUploading(true);
                setIsDownloadOpen(false); // ปิด dropdown
                try {
                    // ถ่ายภาพทั้งใบงาน (Template + Text)
                    await new Promise(resolve => setTimeout(resolve, 100));

                    const mainCanvas = await window.html2canvas(docElement, {
                        scale: 4.0,
                        useCORS: true,
                        allowTaint: true,
                        logging: false,
                        backgroundColor: '#ffffff'
                    });

                    const baseFileName = `FM-GP-03_${currentTask?.no || 'export'}`;

                    if (format === 'pdf') {
                        const pdf = new window.jspdf.jsPDF({
                            orientation: 'portrait',
                            unit: 'mm',
                            format: 'a4',
                            compress: true
                        });
                        const pdfWidth = pdf.internal.pageSize.getWidth();
                        const pdfHeight = pdf.internal.pageSize.getHeight();
                        pdf.addImage(mainCanvas, 'PNG', 0, 0, pdfWidth, pdfHeight, undefined, 'FAST');
                        pdf.save(`${baseFileName}.pdf`);
                    } else if (format === 'jpg') {
                        const link = document.createElement('a');
                        link.download = `${baseFileName}.jpg`;
                        link.href = mainCanvas.toDataURL('image/jpeg', 1.0);
                        link.click();
                    }

                } catch (err) {
                    console.error(`Critical ${format.toUpperCase()} error:`, err);
                    alert(`เกิดข้อผิดพลาดในการสร้าง ${format.toUpperCase()}: ` + (err.message || "Unknown Error"));
                } finally {
                    setIsUploading(false);
                }
            };

            const filteredSalesList = salesUsers.filter(user =>
                user && user.toLowerCase().includes((formData.sales || '').toLowerCase())
            );

            const filteredDesignerList = (designerUsers || []).filter(user =>
                user && user.toLowerCase().includes((formData.designer || '').toLowerCase())
            );

            const getStatusColor = (status) => {
                const s = status ? status.trim() : '';
                if (s === 'Draft' || s === 'ฉบับร่าง') return 'bg-slate-100 text-slate-600 border border-slate-200';
                if (s === 'Completed' || s === 'เสร็จสิ้น' || s === 'ดำเนินการแล้วเสร็จ') return 'bg-blue-100 text-blue-700 border border-blue-200';
                if (s === 'In Progress' || s === 'ดำเนินการอยู่') return 'bg-orange-100 text-orange-700 border border-orange-200';
                if (s === 'Pending' || s === 'รอดำเนินการ') return 'bg-orange-100 text-orange-700 border border-orange-200';
                if (s === 'รอกำหนดระยะเวลาผลิต') return 'bg-purple-100 text-purple-700 border border-purple-200';
                if (s === 'รอเซลล์สรุป') return 'bg-amber-100 text-amber-700 border border-amber-200';
                return 'bg-slate-100 text-slate-700';
            };

            function handleOpenDetail(task) {
                setCurrentTask(task);
                setFormData({
                    product: task.product || '',
                    sales: task.sales || '',
                    customer: task.customer || '',
                    designer: task.designer || '',
                    detail: task.detail || '',

                setSelectedFiles([]);
                setCompletionFiles([]);
                setViewMode('detail');

                // ดึงรูปภาพ FM-GP-03 มาแสดงใน PDF
                if (window.google && window.google.script) {
                    setIsImagesLoading(true);

                        .withSuccessHandler(images => {

                                setCompletionFiles(images);
                            }
                            setIsImagesLoading(false);
                        })

                    // ดึงไฟล์แนบอื่นๆ ในโฟลเดอร์งาน
                    if (task.id) {
                        setIsLoadingFiles(true);
                        window.google.script.run

                                setIsLoadingFiles(false);

                            .withFailureHandler(() => setIsLoadingFiles(false))
                            .getDriveFolderContent(task.id);
                    }
                }
            };

            const handleCreateNew = () => {
                setCurrentTask(null);
                setFormData({ product: '', sales: '', customer: '', designer: '', detail: '', status: 'รอกำหนดระยะเวลาผลิต', qty: '', period: '', installDays: '' });
                setSelectedFiles([]);
                setCompletionFiles([]);

            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));

            const handleReset = () => {
                if (window.confirm('คุณต้องการล้างข้อมูลทั้งหมดในฟอร์มใช่หรือไม่?')) {

            const handleSubmit = (e, statusOverride = null) => {
                if (e) e.preventDefault();

                const finalStatus = statusOverride || formData.status;
                const taskPayload = {
                    ...formData,

                if (window.google && window.google.script) {
                    if (viewMode === 'create') {
                        // CREATE CASE
                        window.google.script.run
                            .withSuccessHandler(res => {
                                if (res.success) {

                                    // Trigger background upload if files exist
                                    if (selectedFiles.length > 0) {

                                    finishSubmit(res, { ...taskPayload, user: currentUser?.name || 'Unknown' });
                                } else {
                                    notify("เกิดข้อผิดพลาด: " + res.error, 'error');
                                    setIsUploading(false);
                                }
                            })
                            .withFailureHandler(err => {
                                notify("บันทึกไม่สำเร็จ: " + err.message, 'error');
                                setIsUploading(false);
                            })
                            .createTaskRecord({ ...taskPayload, user: currentUser?.name || 'Unknown' });
                    } else {
                        // EDIT CASE
                        const orderNo = currentTask.no;

                        // --- AUTO STATUS TRANSITION LOGIC ---
                        let finalStatus = formData.status;
                        // If period is set (not empty and not '0') and status is "รอ...", move to "รอดำเนินการ"
                        if (formData.period && formData.period !== '0' && formData.status === 'รอกำหนดระยะเวลาผลิต') {

                        const updatedPayload = { ...taskPayload, status: finalStatus };

                        window.google.script.run

                                }
                            })

                                notify("อัปเดตไม่สำเร็จ: " + err.message, 'error');
                                setIsUploading(false);
                            })
                            .updateTaskRecord(orderNo, updatedPayload, currentUser?.name || 'Unknown');
                    }
                }

            return (

                            <span
                                className={`cursor-pointer hover:text-primary transition-colors flex items-center gap-1 ${viewMode === 'list' ? 'text-primary font-bold' : ''}`}

                            >
                                <Icon name="CheckSquare" size={12} /> รายการใบงาน
                            </span>
                            {viewMode !== 'list' && (
                                <>
                                    <Icon name="ChevronRight" size={12} />
                                    <span className="text-slate-600 font-medium">
                                        รายละเอียดงาน {currentTask?.no}
                                    </span>
                                </>
                            )}
                        </div>
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div>
                                    <h2 className="text-2xl font-bold text-slate-800">
                                        {viewMode === 'list' ? 'รายการใบงาน' : (viewMode === 'create' ? 'สร้างใบงานใหม่' : `รายละเอียดงาน ${currentTask?.no}`)}
                                    </h2>
                                    <p className="text-slate-500 text-sm">
                                        {viewMode === 'list' ? 'จัดการและติดตามสถานะงานทั้งหมด' : (viewMode === 'create' ? 'ระบุข้อมูลเพื่อสร้างใบงานใหม่ในระบบ' : 'ตรวจสอบข้อมูลและรายละเอียดของใบงาน')}
                                    </p>
                                </div>
                                {viewMode === 'list' && (
                                    <div className="flex items-center gap-3">
                                        <div className="relative w-[300px]">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <Icon name="Search" size={16} className="text-slate-400" />
                                            </div>
                                            <input
                                                type="text"
                                                placeholder="ค้นหา เลขที่งาน, ลูกค้า, เซลล์, รหัส..."
                                                value={localFilter}
                                                onChange={(e) => setLocalFilter(e.target.value)}
                                                className="w-full pl-10 pr-10 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all shadow-sm"
                                            />
                                            {localFilter && (
                                                <button onClick={() => { setLocalFilter(''); clearInitialFilter && clearInitialFilter(); }} className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-red-500 transition-colors">
                                                    <Icon name="XCircle" size={16} />
                                                </button>
                                            )}
                                        </div>
                                        {localFilter && ['Urgent', 'DraftToday', 'WaitPeriod', 'InProgress', 'CompletedToday'].includes(localFilter) && (
                                            <div className="flex items-center gap-2 bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-full text-xs font-bold border border-indigo-100 animate-fade-in shrink-0">
                                                <Icon name="Filter" size={14} />
                                                กรอง: {
                                                    localFilter === 'Urgent' ? 'งานด่วน >16 ชม.' :
                                                        localFilter === 'DraftToday' ? 'รายการใหม่วันนี้' :
                                                            localFilter === 'WaitPeriod' ? 'รอกำหนดเวลา' :
                                                                localFilter === 'InProgress' ? 'กำลังดำเนินการ' :
                                                                    localFilter === 'CompletedToday' ? 'เสร็จสิ้นวันนี้' : localFilter
                                                }
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                            {viewMode === 'list' && (
                                <button
                                    onClick={handleCreateNew}
                                    className="bg-primary text-white px-4 py-2 rounded-xl text-sm font-bold shadow-glow hover:bg-indigo-600 transition-all flex items-center gap-2"
                                >
                                    <Icon name="Plus" size={18} /> สร้างใบงานใหม่
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 min-h-0">
                        {viewMode === 'list' && (
                            <div className="bg-white rounded-2xl shadow-soft h-full flex flex-col overflow-hidden">
                                <div className="overflow-auto custom-scrollbar">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-[#F8FAFC] sticky top-0 z-10 shadow-sm">
                                            <tr>
                                                <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">เลขที่งาน</th>
                                                <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">วันที่สร้าง</th>

                                                <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">รหัสอ้างอิง</th>

                                                <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Designer</th>

                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {tasks.filter(t => {
                                                if (!localFilter) return true;

                                                // Predefined Dashboard Filters
                                                if (localFilter === 'Urgent') {
                                                    const colorClass = getElapsedTimeColor(t.date, t.status);
                                                    return colorClass.includes('bg-[#FF0000]') && !['Completed', 'ดำเนินการแล้วเสร็จ'].includes(t.status);

                                {/* Pagination Mock */}

                                    <div>Showing 1 to {tasks.length} of {tasks.length} results</div>
                                    <div className="flex gap-2">

                                        <button className="px-3 py-1 bg-slate-100 rounded hover:bg-slate-200 disabled:opacity-50" disabled>Next</button>

                        {(viewMode === 'create' || viewMode === 'edit') && (

                                        {/* --- NEW REDESIGNED UI (Matching Screenshot) --- */}

                                                {/* 1. Header Section */}
                                                <div className="flex items-center gap-4 mb-10">

                                                    </div>
                                                </div>

                                                {/* 2. Main Form Fields in Grid */}
